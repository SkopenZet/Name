name: Build Plugin

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # Подсовываем пустые параметры, чтобы Gradle не падал из-за отсутствия git-тегов
    - name: Build with Gradle
      run: ./gradlew build -Pversion="3.0.19" -x test --build-cache
      env:
        CI: true
